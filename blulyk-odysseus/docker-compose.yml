version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: blulyk-odysseus_web_1
      APP_PORT: 7000

  web:
    image: ghcr.io/blulyk/odysseus-umbrel:latest
    container_name: blulyk-odysseus_web_1
    restart: unless-stopped
    stop_grace_period: 1m
    depends_on:
      - chromadb
    environment:
      APP_PORT: "7000"
      AUTH_ENABLED: "false"
      LOCALHOST_BYPASS: "false"
      CHROMADB_HOST: "blulyk-odysseus_chromadb_1"
      CHROMADB_PORT: "8000"
      NTFY_BASE_URL: "http://blulyk-odysseus_ntfy_1"
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Madrid"
    volumes:
      - "${APP_DATA_DIR}/data:/app/data"
      - "${APP_DATA_DIR}/logs:/app/logs"
      - "${APP_DATA_DIR}/data/ssh:/app/.ssh"
      - "${APP_DATA_DIR}/data/huggingface:/app/.cache/huggingface"
      - "${APP_DATA_DIR}/data/local:/app/.local"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chromadb:
    image: docker.io/chromadb/chroma:latest
    container_name: blulyk-odysseus_chromadb_1
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - "${APP_DATA_DIR}/chromadb:/chroma/chroma"

  ntfy:
    image: docker.io/binwiederhier/ntfy
    container_name: blulyk-odysseus_ntfy_1
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: "http://blulyk-odysseus_ntfy_1"
    volumes:
      - "${APP_DATA_DIR}/ntfy:/var/cache/ntfy"
