support: https://github.com/pewdiepie-archdaemon/odysseus/issues
gallery:
  - 1.jpg
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Blulyk
submission: https://github.com/Blulyk/umbrel-app-store
releaseNotes: >-
  v1.0.1 fixes first install by making Odysseus start independently of the
  auxiliary SearXNG healthcheck, updates the SearXNG template for current
  default DOI resolver settings, and replaces the provisional icon with the
  official Odysseus sailboat mark from the project website.
