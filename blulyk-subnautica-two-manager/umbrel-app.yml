gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Blulyk
submission: https://github.com/Blulyk/umbrel-app-store
releaseNotes: >-
  Primera version del gestor de servidores de Subnautica 2 para Umbrel:
  instalacion con SteamCMD, multiples servidores, configuracion editable,
  control de procesos, logs y backups.
