manifestVersion: 1
id: blulyk-obsidian-livesync
name: Obsidian LiveSync
tagline: Sincronización en tiempo real de tu vault de Obsidian
icon: https://raw.githubusercontent.com/vrtmrz/obsidian-livesync/main/logo.png
category: productivity
version: "3.3.3"
port: 5984
description: >-
  Servidor CouchDB autoalojado para sincronizar tu vault de Obsidian en tiempo real
  entre todos tus dispositivos: PC, iPad, iPhone, Mac y Android.


  Instala el plugin "Self-hosted LiveSync" en Obsidian en cada dispositivo y conéctalo
  a este servidor. Las notas se sincronizan automáticamente sin servicios externos.


  ## Credenciales

  - Usuario: admin
  - Contraseña: livesync


  ## Cómo configurarlo

  1. Instala el plugin "Self-hosted LiveSync" desde la comunidad de Obsidian.
  2. Abre sus ajustes y pulsa "Use the setup wizard".
  3. Introduce: http://<ip-de-tu-umbrel>:5984
  4. Usuario: admin / Contraseña: livesync
  5. Nombre de base de datos: obsidian


  ## Cifrado E2E

  Puedes activar cifrado de extremo a extremo directamente desde el plugin.

