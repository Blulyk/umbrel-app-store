version: "3.7"

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${APP_PASSWORD}
      TZ: UTC
    volumes:
      - ${APP_DATA_DIR}/data/.openclaw:/home/node/.openclaw
      - ${APP_DATA_DIR}/data/workspace:/home/node/.openclaw/workspace
    restart: on-failure
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "0.0.0.0",
        "--port",
        "18789",
      ]
    ports:
      - "18789:18789"
      - "18790:18790"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${APP_PASSWORD}
      BROWSER: echo
      TZ: UTC
    volumes:
      - ${APP_DATA_DIR}/data/.openclaw:/home/node/.openclaw
      - ${APP_DATA_DIR}/data/workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
