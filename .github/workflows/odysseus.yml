name: Build Odysseus Umbrel

on:
  push:
    branches:
      - main
    paths:
      - "blulyk-odysseus/**"
      - ".github/workflows/odysseus.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./blulyk-odysseus
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/blulyk/odysseus-umbrel:latest
            ghcr.io/blulyk/odysseus-umbrel:${{ github.sha }}
