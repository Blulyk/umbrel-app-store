releaseNotes: >-
  Hotfixes the ARC Canvas controls and switches the assistant brain back to
  Codex with Google Gemini fallback. Widget toolbar buttons now work reliably,
  duplicate widgets no longer cover each other, and JARVIS can generate safe
  declarative custom widgets such as searchers, calculators, forms, monitors,
  tables and command panels from natural language. Form widgets generated by
  Codex or Gemini are normalized so searchers, calculators and generic forms
  always include a working action.
