icon: https://raw.githubusercontent.com/Blulyk/umbrel-app-store/main/blulyk-alfred/icon.svg
description: >-
  JARVIS is a local-first intelligence console for umbrelOS with Hermes Agent
  as its cognitive core. It combines fast local reflexes for system state,
  Docker visibility, memory and remote asset control with deeper Hermes
  reasoning whenever the Hermes provider is available.


  The interface is built as an operational home cockpit: live host telemetry,
  Hermes state, container registry inspection, connected asset status, voice
  input, spoken replies, and command routing are available from one
  Umbrel-protected app.


  Remote PC control uses an encrypted WebSocket bridge and an explicit action
  allowlist. JARVIS can ping an asset, audit processes, launch configured apps,
  lock the workstation, or request sleep. It does not accept arbitrary shell
  commands.
