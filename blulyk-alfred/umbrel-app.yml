description: >-
  JARVIS is a local-first intelligence console for umbrelOS with Codex Sign in
  with ChatGPT as its primary external brain and Google Gemini as the practical
  fallback. It combines fast local reflexes for system state, Docker visibility,
  memory and remote asset control with external reasoning once configured.


  The interface is built as an operational home cockpit: live host telemetry,
  mind state, container registry inspection, connected asset status,
  voice input, spoken replies, and command routing are available from one
  Umbrel-protected app.


  Remote PC control uses an encrypted WebSocket bridge and an explicit action
  allowlist. JARVIS can ping an asset, audit processes, launch configured apps,
  lock the workstation, or request sleep. It does not accept arbitrary shell
  commands.
