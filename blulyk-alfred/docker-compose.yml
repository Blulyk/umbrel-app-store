version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: blulyk-alfred_web_1
      APP_PORT: 8080

  web:
    image: ghcr.io/blulyk/alfred-umbrel:1.7.2
    container_name: blulyk-alfred_web_1
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - "${APP_DATA_DIR}/data:/data"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/var/log:/host/var/log:ro"
      - "/var/log/journal:/host/var/log/journal:ro"
      - "/run/log/journal:/host/run/log/journal:ro"
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      TZ: "${TZ:-Europe/Madrid}"
      ALFRED_HOST: "0.0.0.0"
      ALFRED_PORT: "8080"
      ALFRED_DB: "/data/alfred.sqlite3"
      ALFRED_REDIS_URL: "redis://blulyk-alfred_redis_1:6379/0"
      CODEX_HOME: "/data/codex"
      JARVIS_CODEX_MODEL: "${JARVIS_CODEX_MODEL:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      JARVIS_GOOGLE_MODEL: "${JARVIS_GOOGLE_MODEL:-gemini-2.5-flash-lite}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
      GOOGLE_OAUTH_REDIRECT_URI: "${GOOGLE_OAUTH_REDIRECT_URI:-http://127.0.0.1:8085/oauth2callback}"
      GOOGLE_OAUTH_SCOPES: "${GOOGLE_OAUTH_SCOPES:-openid email profile}"
      ALFRED_DOCKER_CONTROL: "true"
      JARVIS_SYSTEM_CONTROL: "true"
      JARVIS_HOST_SHELL_IMAGE: "${JARVIS_HOST_SHELL_IMAGE:-alpine:3.20}"
      JARVIS_PUBLIC_PORT: "8099"
      ALFRED_AUTH_LOG: "/host/var/log/auth.log"
      ALFRED_BRIDGE_SECRET: "${APP_SEED}"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: blulyk-alfred_redis_1
    restart: on-failure
    command: ["redis-server", "--save", "", "--appendonly", "no"]
