version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: blulyk-alfred_web_1
      APP_PORT: 8080

  web:
    image: ghcr.io/blulyk/alfred-umbrel:1.0.0
    container_name: blulyk-alfred_web_1
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - "${APP_DATA_DIR}/data:/data"
      - "${UMBREL_ROOT}/app-data/blulyk-hermes-agent/data:/hermes-data:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/var/log:/host/var/log:ro"
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      TZ: "${TZ:-Europe/Madrid}"
      ALFRED_HOST: "0.0.0.0"
      ALFRED_PORT: "8080"
      ALFRED_DB: "/data/alfred.sqlite3"
      ALFRED_REDIS_URL: "redis://blulyk-alfred_redis_1:6379/0"
      ALFRED_HERMES_BASE_URL: "http://blulyk-hermes-agent_web_1:9119"
      ALFRED_HERMES_API_BASE_URL: "http://blulyk-hermes-agent_web_1:8642/v1"
      ALFRED_HERMES_API_KEY: "jarvis-hermes-bridge"
      ALFRED_HERMES_MODEL: "hermes-agent"
      ALFRED_DOCKER_CONTROL: "false"
      ALFRED_AUTH_LOG: "/host/var/log/auth.log"
      ALFRED_BRIDGE_SECRET: "${APP_SEED}"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: blulyk-alfred_redis_1
    restart: on-failure
    command: ["redis-server", "--save", "", "--appendonly", "no"]
