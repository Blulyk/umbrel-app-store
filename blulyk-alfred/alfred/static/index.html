<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JARVIS ARC Canvas</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app-shell" id="appShell">
    <div class="grid-plane" aria-hidden="true"></div>

    <header class="topbar">
      <div>
        <p class="eyebrow">ARC Canvas Orchestrator</p>
        <h1>JARVIS</h1>
        <span id="systemState" class="system-line">Assessing local systems</span>
      </div>
      <div class="top-actions">
        <span id="modelState" class="status-pill">Codex/Gemini</span>
        <span id="latencyState" class="status-pill muted-pill">-- ms</span>
        <button id="centerCanvas" class="hud-button" type="button">Centrar</button>
        <button id="syncCanvas" class="hud-button" type="button">Sync</button>
        <button id="openConfig" class="hud-button" type="button">Config</button>
      </div>
    </header>

    <aside class="sidebar" aria-label="Paneles JARVIS">
      <button class="side-button active" data-panel="chat">Chat</button>
      <button class="side-button" data-demo="system">Métricas</button>
      <button class="side-button" data-panel="config">Config</button>
      <button class="side-button" data-demo="logs">Logs</button>
      <button class="side-button" data-demo="assets">Assets</button>
      <button class="side-button" data-demo="automation">Automatizaciones</button>
      <button class="side-button" data-panel="memory">Memoria</button>
      <button class="side-button" data-panel="tools">Herramientas</button>
    </aside>

    <section class="canvas-viewport" id="canvasViewport" aria-label="Canvas de widgets JARVIS">
      <div class="canvas-world" id="canvasWorld">
        <button class="jarvis-core" id="jarvisCore" type="button" aria-label="Estado central de JARVIS">
          <span class="core-ring ring-a"></span>
          <span class="core-ring ring-b"></span>
          <span class="core-ring ring-c"></span>
          <strong id="coreState">IDLE</strong>
        </button>
        <div id="widgetLayer" class="widget-layer"></div>
      </div>
    </section>

    <section class="inspector" id="inspector" aria-label="Panel lateral">
      <div class="panel-head">
        <div>
          <p class="eyebrow" id="inspectorEyebrow">Chat</p>
          <h2 id="inspectorTitle">JARVIS Console</h2>
        </div>
        <button id="closeInspector" class="icon-button" type="button" aria-label="Cerrar panel">×</button>
      </div>
      <div id="inspectorBody" class="inspector-body"></div>
    </section>

    <form id="commandBar" class="command-bar">
      <button id="attachButton" class="icon-button" type="button" aria-label="Adjuntar">+</button>
      <select id="commandMode" aria-label="Modo de comando">
        <option value="fast">Rápido</option>
        <option value="deep">Profundo</option>
        <option value="agent">Agente</option>
        <option value="auto">Automático</option>
      </select>
      <input id="commandInput" autocomplete="off" placeholder="Pide a JARVIS crear, mover, editar, borrar o consultar widgets">
      <button id="micButton" class="icon-button" type="button" aria-label="Micrófono push-to-talk">MIC</button>
      <button id="clearInput" class="icon-button" type="button" aria-label="Limpiar input">CLR</button>
      <button class="send-button" type="submit">Ejecutar</button>
      <div id="commandHints" class="command-hints"></div>
    </form>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
