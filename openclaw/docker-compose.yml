version: '3.7'
services:
  app_proxy:
    environment:
      APP_HOST: openclaw_gateway_1
      APP_PORT: 18789
    container_name: openclaw_app_proxy_1
  gateway:
    image: ghcr.io/openclaw/openclaw:latest
    user: '1000:1000'
    init: true
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/data/linuxbrew:/home/linuxbrew
    container_name: openclaw_gateway_1
