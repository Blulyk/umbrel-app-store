manifestVersion: 1
id: blulyk-la-central-de-muestras
name: La central de muestras
tagline: Publica demos web para clientes con Tailscale Funnel
icon: https://raw.githubusercontent.com/Blulyk/umbrel-app-store/main/blulyk-la-central-de-muestras/icon.svg
category: Development
version: "0.1.0"
port: 3037
description: >-
  La central de muestras detecta carpetas de webs estaticas dentro de tu
  carpeta proyectos de Umbrel y te permite crear o desactivar enlaces publicos
  HTTPS para ensenarlas a clientes. Cada proyecto es una carpeta con su
  index.html, CSS, JavaScript y recursos. La app sirve las muestras activas bajo
  rutas publicas pensadas para usarse con Tailscale Funnel, por ejemplo
  https://umbrel.tailcbdb4e.ts.net/_muestras/web_fontanero/.


  Para la V1, la app publica webs estaticas. No ejecuta servidores de
  desarrollo como Vite, Next o Astro. El Funnel se configura una vez en el host
  apuntando al puerto 3037, y desde entonces puedes activar o apagar muestras
  desde el panel.
developer: Blulyk
website: https://github.com/Blulyk/umbrel-app-store
dependencies: []
repo: https://github.com/Blulyk/umbrel-app-store
support: https://github.com/Blulyk/umbrel-app-store/issues
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Blulyk
submission: https://github.com/Blulyk/umbrel-app-store
releaseNotes: >-
  V1 inicial: escaneo de la carpeta proyectos, activacion/desactivacion de
  muestras, enlaces publicos por ruta, estado persistente y servidor estatico
  seguro para HTML, CSS, JavaScript y recursos.
