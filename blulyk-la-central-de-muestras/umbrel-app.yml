manifestVersion: 1
id: blulyk-la-central-de-muestras
name: La central de muestras
tagline: Publica demos web para clientes con Tailscale Funnel
icon: https://raw.githubusercontent.com/Blulyk/umbrel-app-store/main/blulyk-la-central-de-muestras/icon.svg
category: Development
version: "0.1.0"
port: 3037
description: >-
  La central de muestras detecta carpetas de webs estaticas dentro de tu
  carpeta proyectos de Umbrel y te permite elegir que web se muestra en un
  unico enlace publico HTTPS de Tailscale Funnel. Cada proyecto es una carpeta
  con su index.html, CSS, JavaScript y recursos. Como normalmente solo necesitas
  ensenar una propuesta cada vez, la app mantiene una unica muestra activa y el
  mismo enlace pasa a apuntar a la carpeta seleccionada.


  Para esta version, la app publica webs estaticas. No ejecuta servidores de
  desarrollo como Vite, Next o Astro. El Funnel se configura una vez en el host
  apuntando a la ruta activa de la app, y desde entonces puedes cambiar la web
  publicada desde el panel.
developer: Blulyk
website: https://github.com/Blulyk/umbrel-app-store
dependencies: []
repo: https://github.com/Blulyk/umbrel-app-store
support: https://github.com/Blulyk/umbrel-app-store/issues
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Blulyk
submission: https://github.com/Blulyk/umbrel-app-store
releaseNotes: >-
  Modelo de enlace unico: escaneo de la carpeta proyectos, seleccion de una
  muestra activa, apagado de la muestra y servidor estatico seguro para HTML,
  CSS, JavaScript y recursos.
