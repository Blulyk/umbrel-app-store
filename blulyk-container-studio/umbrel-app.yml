manifestVersion: 1
id: blulyk-container-studio
name: Container Studio
tagline: Visual container manager for UmbrelOS
icon: https://raw.githubusercontent.com/Blulyk/umbrel-app-store/main/blulyk-container-studio/icon.svg
category: developer
version: "0.2.3"
port: 3018
description: >-
  Container Studio is a visual Docker and Umbrel app manager inspired by the
  ZimaOS container editor. It shows installed Umbrel apps as icon cards and
  lets you inspect images, status, ports, networks, mounts, Compose files,
  environment variables and recent logs from a web UI.


  Environment variables can be added, edited or removed per configurable
  service. Saving creates an automatic docker-compose.yml backup, writes the
  updated Compose file and recreates the edited service so the new environment
  is applied immediately.
developer: Blulyk
website: https://github.com/Blulyk/umbrel-app-store
dependencies: []
repo: https://github.com/Blulyk/umbrel-app-store
support: https://github.com/Blulyk/umbrel-app-store/issues
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Blulyk
submission: https://github.com/Blulyk/umbrel-app-store
releaseNotes: >-
  v0.2.3 disables browser caching for app assets and busts the JS/CSS URLs so
  Umbrel immediately shows the current app grid and environment editor after
  updates.
