<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Umbrel Container Studio</title>
    <link rel="stylesheet" href="/styles.css?v=0.2.3" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="mark">U</div>
          <div>
            <h1>Container Studio</h1>
            <p>Editor visual para apps de UmbrelOS</p>
          </div>
        </div>

        <div class="toolbar">
          <input id="search" type="search" placeholder="Buscar app instalada..." autocomplete="off" />
          <button id="refresh" type="button">Actualizar</button>
        </div>
      </header>

      <section class="app-screen">
        <div class="section-title">
          <div>
            <p class="eyebrow">Apps instaladas</p>
            <h2>Selecciona una app para configurarla</h2>
          </div>
          <span id="appCount" class="meta"></span>
        </div>
        <section id="appGrid" class="app-grid" aria-label="Apps instaladas"></section>
      </section>

      <section id="emptyState" class="empty">
        <div>
          <h3>Sin app seleccionada</h3>
          <p>Abre una tarjeta para editar variables, revisar puertos, ver compose y reiniciar servicios.</p>
        </div>
      </section>

      <section id="detail" class="detail hidden">
        <nav class="detail-header">
          <div class="selected-app">
            <img id="detailIcon" alt="" />
            <div>
              <p class="eyebrow" id="detailMeta">UmbrelOS</p>
              <h2 id="appTitle">Selecciona una app</h2>
            </div>
          </div>
          <div class="actions">
            <button id="restartBtn" type="button" disabled>Reiniciar app</button>
          </div>
        </nav>

        <div class="tabs">
          <button class="tab active" data-tab="env">Variables</button>
          <button class="tab" data-tab="overview">Resumen</button>
          <button class="tab" data-tab="ports">Puertos y red</button>
          <button class="tab" data-tab="files">Compose</button>
          <button class="tab" data-tab="logs">Logs</button>
        </div>

        <div class="panel active" id="env"></div>
        <div class="panel" id="overview"></div>
        <div class="panel" id="ports"></div>
        <div class="panel" id="files"></div>
        <div class="panel" id="logs"></div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="/app.js?v=0.2.3" type="module"></script>
  </body>
</html>
