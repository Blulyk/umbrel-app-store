manifestVersion: 1
id: blulyk-hermes-webui
name: Hermes WebUI
tagline: Web interface for Hermes Agent
icon: https://raw.githubusercontent.com/Blulyk/umbrel-app-store/main/blulyk-hermes-webui/icon.png
category: ai
version: "0.51.326"
port: 8787
description: >-
  Hermes WebUI is a browser interface for Hermes Agent. This Umbrel package
  runs the official Hermes WebUI image in gateway mode and connects it to the
  Hermes Agent app from this store through its API server.


  Install and start Hermes Agent first. Hermes WebUI will use the agent API at
  host.docker.internal:8642 with the bridge key configured in the Hermes Agent
  Umbrel package, so you can chat with and manage the same Hermes backend from a
  dedicated web interface.
developer: nesquena
website: https://github.com/nesquena/hermes-webui
