repo: https://github.com/nesquena/hermes-webui
support: https://github.com/nesquena/hermes-webui/issues
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Blulyk
submission: https://github.com/Blulyk/umbrel-app-store
releaseNotes: >-
  Initial Umbrel package for Hermes WebUI v0.51.326, preconfigured to connect
  to the Hermes Agent app over the local Umbrel host gateway.
