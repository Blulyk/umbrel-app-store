name: CalorieAI
version: "4.1.0"
tagline: Track calories from food photos with Gemini AI
description: >-
  CalorieAI lets you log meals by simply taking a photo. Google Gemini AI
  identifies each food item and estimates calories, protein, carbs and fat
  automatically. Features include a daily dashboard with calorie ring, macro
  tracking, water intake, full month-by-month history navigation, weekly charts,
  an AI-calculated personalised calorie goal, a Recipe Book (Recetario), and a
  complete Apple-style redesign with a fixed translucent bottom navigation.
  Uploaded meal and recipe photos are optimized and served from persistent
  Umbrel storage. Gemini overload errors are retried automatically with simple
  user-facing messages and food analysis falls back across compatible Gemini
  models.
  v3.0 adds: barcode scanner (Open Food Facts, 3M+ products), URL recipe
  importer (auto-extracts ingredients and nutrition from any food blog),
  restaurant database (65+ items from McDonald's, Burger King, KFC, Starbucks,
  Five Guys, Subway), weekly meal planner with auto-generated shopping list,
  adaptive TDEE (calculates real energy expenditure from weight + calorie
  history), weight history chart with trend line, intermittent fasting timer
  with progress ring (optional, off by default), and carb cycling with separate
  training/rest day calorie goals (optional, off by default). v3.0.3 fixes
  barcode scanning on Umbrel by replacing the native-only browser scanner with
  a ZXing scanner plus photo and manual-code fallbacks, updates Next.js within
  the 14.2 line for security fixes, corrects the Docker image tag used by
  Umbrel, and restores Umbrel's proxy startup by letting app_proxy own the
  public app port. v3.0.5 fixes profile saving after fresh installs by storing
  boolean settings in SQLite-safe format and improves the profile error message.
  v3.0.6 restores Umbrel update detection after the emergency manual repair.
  v3.0.7 makes calorie goal calculation instant and reliable by using the
  local Mifflin-St Jeor formula instead of waiting on Gemini.
  v3.0.8 keeps the generated profile summary visible, adds manual recipe
  nutrition entry, lets shopping-list items be added by hand, and improves
  bottom-navigation spacing for sheets and dropdowns.
  v4.0 adds: Sushi Buffet Session — a fullscreen animated session with a
  central spring-animated emoji button (cycles through 12 sushi emojis on
  each tap), 6 category counters (Nigiri, Maki, Tempura, Gyoza, Postre,
  Otros), live timer, and automatic Gemini nutrition analysis on finish.
  Buffet meals show piece count and record badges in the history. Five new
  achievements: Primera sesion, Apetito de sushi (25), Maestro del maki
  (40), Campeon del buffet (50), and Leyenda del sushi (100 piezas).
  Full Spanish UI. Supports multiple users — each with their own Gemini API key.
  v4.0.4 shows detailed Gemini diagnostics on buffet analysis failure: which models
  were tried, HTTP codes, Google error messages, and per-attempt details — so you
  can see exactly why Gemini failed instead of a generic error. Each model gets an
  18-second timeout; quota/auth errors short-circuit the retry loop immediately.
  v4.1 fixes three recipe issues: (1) meal type picker — when adding a recipe to
  the diary a sheet now lets you choose Desayuno, Almuerzo, Cena or Snack
  (pre-selected based on the current time); (2) emoji banners — recipes without a
  photo get a Gemini-suggested emoji displayed as a gradient banner in both the
  Recetario and the daily log; (3) image serving — recipe and meal photos now load
  correctly on Umbrel via a dedicated API route that reads from persistent storage.
