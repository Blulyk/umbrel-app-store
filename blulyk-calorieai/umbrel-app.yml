manifestVersion: 1
id: blulyk-calorieai
category: utilities
name: CalorieAI
version: "3.0.4"
tagline: Track calories from food photos with Gemini AI
description: >-
  CalorieAI lets you log meals by simply taking a photo. Google Gemini AI
  identifies each food item and estimates calories, protein, carbs and fat
  automatically. Features include a daily dashboard with calorie ring, macro
  tracking, water intake, full month-by-month history navigation, weekly charts,
  an AI-calculated personalised calorie goal, a Recipe Book (Recetario), and a
  complete Apple-style redesign with a fixed translucent bottom navigation.
  Uploaded meal and recipe photos are optimized and served from persistent
  Umbrel storage. Gemini overload errors are retried automatically with simple
  user-facing messages and food analysis falls back across compatible Gemini
  models.
  v3.0 adds: barcode scanner (Open Food Facts, 3M+ products), URL recipe
  importer (auto-extracts ingredients and nutrition from any food blog),
  restaurant database (65+ items from McDonald's, Burger King, KFC, Starbucks,
  Five Guys, Subway), weekly meal planner with auto-generated shopping list,
  adaptive TDEE (calculates real energy expenditure from weight + calorie
  history), weight history chart with trend line, intermittent fasting timer
  with progress ring (optional, off by default), and carb cycling with separate
  training/rest day calorie goals (optional, off by default). v3.0.3 fixes
  barcode scanning on Umbrel by replacing the native-only browser scanner with
  a ZXing scanner plus photo and manual-code fallbacks, updates Next.js within
  the 14.2 line for security fixes, corrects the Docker image tag used by
  Umbrel, and restores Umbrel's proxy startup by letting app_proxy own the
  public app port.
  Full Spanish UI. Supports multiple users — each with their own Gemini API key.
