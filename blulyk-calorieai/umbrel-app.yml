manifestVersion: 1
id: blulyk-calorieai
category: utilities
name: CalorieAI
version: "2.0.13"
tagline: Track calories from food photos with Gemini AI
description: >-
  CalorieAI lets you log meals by simply taking a photo. Google Gemini AI
  identifies each food item and estimates calories, protein, carbs and fat
  automatically. Features include a daily dashboard with calorie ring, macro
  tracking, water intake, full month-by-month history navigation, weekly charts,
  an AI-calculated personalised calorie goal, a Recipe Book (Recetario), and a
  complete Apple-style 2.0 redesign with a fixed translucent bottom navigation
  and water intake stored in the daily history. Uploaded meal and recipe photos
  are optimized and served from persistent Umbrel storage. Gemini overload
  errors are retried automatically with simple user-facing messages and food
  analysis falls back across compatible Gemini models and shows when an
  alternative model was used. The daily calorie ring has been redesigned with
  a layered Apple-style circular chart with a dominant blue arc and separated
  category capsules.
  Full Spanish UI.
  Supports multiple users — each with their own Gemini API key.
