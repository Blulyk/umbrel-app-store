version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: $APP_CALORIEAI_IP
      APP_PORT: 3000

  web:
    image: ghcr.io/blulyk/calorieai:latest
    container_name: calorieai_web_1
    restart: on-failure
    stop_grace_period: 1m
    network_mode: bridge
    volumes:
      - "${APP_DATA_DIR}/data:/data"
      - "${APP_DATA_DIR}/uploads:/app/public/uploads"
    environment:
      NODE_ENV: "production"
      DB_PATH: "/data"
      JWT_SECRET: "${APP_SEED}"
    ports:
      - "${APP_CALORIEAI_PORT}:3000"
