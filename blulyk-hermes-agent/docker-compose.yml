version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: blulyk-hermes-agent_web_1
      APP_PORT: 9119

  web:
    image: ghcr.io/blulyk/hermes-agent-umbrel:latest
    container_name: blulyk-hermes-agent_web_1
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      HERMES_HOME: "/opt/data"
      HOME: "/opt/data"
      PORT: "9119"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: "jarvis-hermes-bridge"
      API_SERVER_CORS_ORIGINS: "*"
      TZ: "Europe/Madrid"
    volumes:
      - "${APP_DATA_DIR}/data:/opt/data"
    ports:
      - "8642:9119"
