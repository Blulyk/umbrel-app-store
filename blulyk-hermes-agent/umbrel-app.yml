repo: https://github.com/NousResearch/hermes-agent
support: https://github.com/NousResearch/hermes-agent/issues
gallery: []
path: ""
defaultUsername: ""
defaultPassword: ""
submitter: Blulyk
submission: https://github.com/Blulyk/umbrel-app-store
releaseNotes: >-
  v0.14.2 applies a Codex/OpenAI Responses hotfix for the Hermes
  "'NoneType' object is not iterable" crash when the ChatGPT Codex backend
  returns response.output=null. Keeps the Umbrel-native browser terminal with
  Chat, Setup, Model, Status and Shell modes.
