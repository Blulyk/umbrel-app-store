manifestVersion: 1
id: blulyk-hermes-agent
name: Hermes Agent
tagline: Autonomous AI agent with memory, skills and messaging
icon: https://raw.githubusercontent.com/Blulyk/umbrel-app-store/main/blulyk-hermes-agent/icon.svg
category: ai
version: "0.14.2"
port: 9119
description: >-
  Hermes Agent is the self-improving AI agent from Nous Research. It runs on
  your server, keeps persistent memory, creates and improves skills, supports
  scheduled automations, and can connect to messaging platforms such as
  Telegram, Discord, Slack, WhatsApp, Signal and email.


  This Umbrel app runs a thin wrapper around the official Hermes Agent Docker
  image with persistent state mounted at /opt/data. The web UI exposed through
  Umbrel includes an embedded terminal so you can run Hermes chat, setup,
  model selection, status and a shell directly from the app.


  After installing, open the app, use the Setup tab to configure Hermes, then
  return to Chat to talk with the agent without opening an external terminal.
  API keys and Hermes configuration are stored in your app data volume.
developer: Nous Research
website: https://hermes-agent.nousresearch.com/
