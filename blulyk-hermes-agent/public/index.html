<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#041c1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Hermes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Hermes Agent Terminal</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="bg-noise"></div>
  <div class="bg-wash"></div>
  <div class="bg-radial"></div>

  <main class="shell">
    <header class="site-header">
      <div class="brand">
        <span>Hermes<br>Agent</span>
      </div>
      <div class="nav-cell" id="activeMode">Chat</div>
      <button class="nav-cell command" id="restart">Reiniciar</button>
      <button class="nav-cell command" id="controlTerminal">Control</button>
      <div class="nav-cell status" id="state">conectando</div>
    </header>

    <section class="app-grid">
      <aside class="control-panel">
        <div class="panel-section">
          <small>Modo</small>
          <div class="mode-grid" aria-label="Modos de terminal">
            <button class="mode active" data-mode="chat">Chat</button>
            <button class="mode" data-mode="setup">Setup</button>
            <button class="mode" data-mode="model">Modelo</button>
            <button class="mode" data-mode="status">Estado</button>
            <button class="mode" data-mode="shell">Shell</button>
          </div>
        </div>

        <div class="panel-section">
          <small>Comandos</small>
          <div class="quick-grid">
            <button class="quick" data-send="/help">/help</button>
            <button class="quick" data-send="/model">/model</button>
            <button class="quick" data-send="/status">/status</button>
            <button class="quick" data-send="/clear">/clear</button>
          </div>
        </div>

        <div class="panel-section">
          <small>Datos</small>
          <dl class="info-list">
            <div><dt>Home</dt><dd>/opt/data</dd></div>
            <div><dt>Sesion</dt><dd id="sessionState">activa</dd></div>
            <div><dt>Proxy</dt><dd>Umbrel</dd></div>
          </dl>
        </div>
      </aside>

      <section class="terminal-wrap" aria-label="Hermes terminal">
        <div class="terminal-titlebar">
          <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
          <span id="title">Chat</span>
          <span class="terminal-path">/opt/data</span>
        </div>
        <div id="terminal"></div>
        <form class="mobile-composer" id="mobileComposer" autocomplete="off">
          <div class="mobile-suggestions" id="mobileSuggestions" aria-label="Sugerencias de comandos"></div>
          <input id="mobileInput" type="text" inputmode="text" autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false" placeholder="Mensaje o /comando">
          <button id="mobileSend" type="button">Enviar</button>
        </form>
      </section>
    </section>

    <footer class="site-footer">
      <div>Terminal Web</div>
      <div>Persistente <span>/opt/data</span></div>
      <div>Codex Hotfix <span>activo</span></div>
      <div>Hermes <span>v0.14.0</span></div>
      <div>Umbrel</div>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
